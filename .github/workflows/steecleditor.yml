name: steecleditor-ci

on:
  push:
    branches: ["**"]
  pull_request:
  workflow_dispatch:
    inputs:
      run_benchmark:
        description: "Run ignored steecleditor benchmark tests"
        required: false
        default: false
        type: boolean

jobs:
  editorconfig-quick:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate .editorconfig sections
        run: ./scripts/verify-editorconfig.sh

  site-quick:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: docs/angular/package-lock.json

      - name: Install docs/angular dependencies
        working-directory: docs/angular
        run: npm ci

      - name: Verify i18n + build
        working-directory: docs/angular
        run: npm run build:verify

      - name: Verify docs/site is in sync
        run: ./scripts/verify-site-sync.sh

  site-urls-quick:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: docs/angular/package-lock.json

      - name: Install docs/angular dependencies
        working-directory: docs/angular
        run: npm ci

      - name: Check site URLs only
        working-directory: docs/angular
        run: npm run check:urls

  site-diff-preview:
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'pull_request' }}
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: docs/angular/package-lock.json

      - name: Install docs/angular dependencies
        working-directory: docs/angular
        run: npm ci

      - name: Build docs site
        working-directory: docs/angular
        run: npm run build:verify

      - name: Generate docs/site diff preview
        run: ./scripts/verify-site-sync.sh --allow-diff --diff-file /tmp/docs-site.diff

      - name: Upload docs/site diff artifact
        uses: actions/upload-artifact@v4
        with:
          name: docs-site-diff-preview
          path: /tmp/docs-site.diff

  phase2-quick:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2

      - name: Phase2 symbols false positives
        run: cargo test --bin steecleditor symbols_false_positives_phase2

      - name: Phase2 highlighting helpers
        run: cargo test --bin steecleditor advanced_highlighting_phase2_helpers

      - name: Phase2 highlighting non regression
        run: cargo test --bin steecleditor phase2_highlighting_non_regression

      - name: Makefile static pattern symbols
        run: cargo test --bin steecleditor collect_symbols_makefile_static_pattern_targets

  shell-dialect-quick:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2

      - name: Check shell dialect completion
        run: cargo test --bin steecleditor completion_with_dialect_shell

  snapshot-sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2

      - name: Check snippet snapshot sync
        run: cargo test --bin steecleditor snippets_doc_snapshot_matches_language_data

  doc-sync-quick:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2

      - name: Check snippets snapshot
        run: cargo test --bin steecleditor snippets_doc_snapshot_matches_language_data

      - name: Check support matrix snapshot
        run: cargo test --bin steecleditor support_matrix_doc_snapshot_matches_language_data

      - name: Check phase2 coverage snapshot
        run: cargo test --bin steecleditor phase2_coverage_snapshot_matches_docs

      - name: Check phase2 coverage snapshot format
        run: cargo test --bin steecleditor phase2_coverage_snapshot_format_non_regression

  doc-editorial-quick:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2

      - name: Run README site policy quick tests
        run: cargo test --bin steecleditor readme_site_

  site-qa-local-contract:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2

      - name: Verify site QA contracts
        run: cargo test --bin steecleditor site_urls_quick_contract

      - name: Verify site sync script contract
        run: cargo test --bin steecleditor verify_site_sync_script_contract

      - name: Verify qa:local script contract
        run: cargo test --bin steecleditor qa_local_script_contract

  site-quick-contracts:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2

      - name: Run bundled site quick contracts
        run: cargo test --bin steecleditor site_quick_contracts_bundle

  tests:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2

      - name: Run steecleditor tests
        run: cargo test --bin steecleditor

  benchmark:
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.run_benchmark }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2

      - name: Run ignored benchmark test
        run: cargo test --bin steecleditor benchmark_highlighting_large_files -- --ignored --nocapture
