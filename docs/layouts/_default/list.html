<!doctype html>
<html lang="fr">
  <head>
    {{ partial "head.html" . }}
  </head>
  <body class="site">
    {{ partial "header.html" . }}
    <div class="site-main">
      {{ partial "sidebar.html" . }}
      <main class="site-content" data-doc-content>
        {{ .Content }}
        {{ if .Pages }}
        <section class="doc-list">
          <h2>Pages</h2>
          <ul>
            {{ range .Pages }}
              <li><a href="{{ .RelPermalink }}">{{ .Title }}</a></li>
            {{ end }}
          </ul>
        </section>
        {{ end }}
      </main>
      {{ partial "toc.html" . }}
    </div>
    {{ partial "footer.html" . }}
    <script src="{{ "assets/js/site.js" | relURL }}"></script>
    <script src="{{ "assets/js/toc.js" | relURL }}"></script>
  </body>
</html>
