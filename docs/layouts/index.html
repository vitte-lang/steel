<!doctype html>
<html lang="fr">
  <head>
    {{ partial "head.html" . }}
  </head>
  <body class="site">
    {{ partial "header.html" . }}
    <div class="site-main">
      {{ partial "sidebar.html" . }}
      <main class="site-content" data-doc-content>
        {{ .Content }}
      </main>
      {{ partial "toc.html" . }}
    </div>
    {{ partial "footer.html" . }}
    <script src="{{ "assets/js/site.js" | relURL }}"></script>
    <script src="{{ "assets/js/toc.js" | relURL }}"></script>
  </body>
</html>
