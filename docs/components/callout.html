<!--
  Muffin docs component: callout

  Purpose:
    A compact, modern callout panel for docs pages: note/tip/warn/danger/info.

  Usage (inline):
    <div class="mf-callout mf-callout--info">
      <div class="mf-callout__head">
        <span class="mf-callout__icon" aria-hidden="true"></span>
        <div class="mf-callout__title">Info</div>
      </div>
      <div class="mf-callout__body">
        <p>Text…</p>
      </div>
    </div>

  Usage (data-driven):
    <div data-mf-callout
         data-kind="warn"
         data-title="Breaking change"
         data-body="This will change behavior."
         data-variant="solid"
         data-tone="amber"></div>

  Kinds:
    - info | note | tip | warn | danger

  Variants:
    - solid | outline | subtle | ghost

  Tones:
    - neutral | indigo | green | amber | red
-->

<style id="mf-callout-style">
  :root {
    --mf-callout-radius: 16px;
    --mf-callout-border: rgba(255,255,255,0.12);
    --mf-callout-bg: rgba(255,255,255,0.06);
    --mf-callout-bg-2: rgba(255,255,255,0.10);
    --mf-callout-fg: rgba(255,255,255,0.92);
    --mf-callout-fg-muted: rgba(255,255,255,0.72);
    --mf-callout-shadow: 0 18px 55px rgba(0,0,0,0.30);

    --mf-tone-neutral: 200 8% 72%;
    --mf-tone-indigo: 250 90% 70%;
    --mf-tone-green: 150 70% 60%;
    --mf-tone-amber: 40 95% 65%;
    --mf-tone-red: 0 85% 65%;
  }

  .mf-callout {
    --mf-tone: var(--mf-tone-neutral);
    --mf-accent: hsl(var(--mf-tone));
    --mf-accent-soft: hsl(var(--mf-tone) / 0.14);
    --mf-accent-soft-2: hsl(var(--mf-tone) / 0.22);
    --mf-accent-border: hsl(var(--mf-tone) / 0.28);

    position: relative;
    display: block;
    border-radius: var(--mf-callout-radius);
    border: 1px solid var(--mf-callout-border);
    background: var(--mf-callout-bg);
    color: var(--mf-callout-fg);

    padding: 14px 14px 14px 14px;
    margin: 16px 0;

    box-shadow: none;
    overflow: hidden;

    font: 500 14px/1.5 system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
    letter-spacing: 0.1px;

    transition:
      transform 160ms ease,
      background 160ms ease,
      border-color 160ms ease,
      box-shadow 220ms ease;
  }

  .mf-callout:hover {
    background: var(--mf-callout-bg-2);
    border-color: rgba(255,255,255,0.18);
    box-shadow: var(--mf-callout-shadow);
  }

  .mf-callout:focus-within {
    border-color: hsl(var(--mf-tone) / 0.38);
  }

  .mf-callout__head {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 10px;
  }

  .mf-callout__icon {
    width: 18px;
    height: 18px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    color: hsl(var(--mf-tone) / 0.95);
  }

  .mf-callout__icon svg {
    width: 18px;
    height: 18px;
    fill: none;
    stroke: currentColor;
    stroke-width: 1.9;
    stroke-linecap: round;
    stroke-linejoin: round;
  }

  .mf-callout__title {
    font-weight: 750;
    font-size: 13px;
    letter-spacing: 0.2px;
    color: rgba(255,255,255,0.92);
    text-transform: none;
  }

  .mf-callout__body {
    color: rgba(255,255,255,0.84);
  }

  .mf-callout__body p {
    margin: 0.45em 0;
  }

  .mf-callout__body p:first-child { margin-top: 0; }
  .mf-callout__body p:last-child { margin-bottom: 0; }

  .mf-callout__body code {
    font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, "Liberation Mono", monospace;
    font-size: 0.95em;
    padding: 0.08em 0.35em;
    border-radius: 8px;
    background: rgba(0,0,0,0.22);
    border: 1px solid rgba(255,255,255,0.10);
  }

  .mf-callout__body pre {
    margin: 10px 0 0 0;
    padding: 12px;
    border-radius: 14px;
    background: rgba(0,0,0,0.28);
    border: 1px solid rgba(255,255,255,0.10);
    overflow: auto;
  }

  /* Left accent bar */
  .mf-callout::before {
    content: "";
    position: absolute;
    left: 0;
    top: 0;
    bottom: 0;
    width: 4px;
    background: hsl(var(--mf-tone) / 0.55);
  }

  /* Variants */
  .mf-callout--solid {
    background: var(--mf-accent-soft);
    border-color: var(--mf-accent-border);
  }
  .mf-callout--solid:hover {
    background: var(--mf-accent-soft-2);
    border-color: hsl(var(--mf-tone) / 0.36);
  }

  .mf-callout--outline {
    background: transparent;
    border-color: var(--mf-accent-border);
  }
  .mf-callout--outline:hover {
    background: hsl(var(--mf-tone) / 0.10);
    border-color: hsl(var(--mf-tone) / 0.34);
  }

  .mf-callout--subtle {
    background: rgba(255,255,255,0.05);
    border-color: rgba(255,255,255,0.10);
  }

  .mf-callout--ghost {
    background: transparent;
    border-color: rgba(255,255,255,0.10);
  }
  .mf-callout--ghost:hover {
    background: rgba(255,255,255,0.06);
    border-color: rgba(255,255,255,0.14);
  }

  /* Tones */
  .mf-callout--neutral { --mf-tone: var(--mf-tone-neutral); }
  .mf-callout--indigo  { --mf-tone: var(--mf-tone-indigo); }
  .mf-callout--green   { --mf-tone: var(--mf-tone-green); }
  .mf-callout--amber   { --mf-tone: var(--mf-tone-amber); }
  .mf-callout--red     { --mf-tone: var(--mf-tone-red); }

  /* Kinds (default tone mapping) */
  .mf-callout--info   { --mf-tone: var(--mf-tone-indigo); }
  .mf-callout--note   { --mf-tone: var(--mf-tone-neutral); }
  .mf-callout--tip    { --mf-tone: var(--mf-tone-green); }
  .mf-callout--warn   { --mf-tone: var(--mf-tone-amber); }
  .mf-callout--danger { --mf-tone: var(--mf-tone-red); }

  /* Compact */
  .mf-callout--compact {
    padding: 12px;
  }

  /* Accessibility: reduced motion */
  @media (prefers-reduced-motion: reduce) {
    .mf-callout {
      transition: none;
    }
    .mf-callout:hover {
      box-shadow: none;
    }
  }
</style>

<template id="mf-callout-template">
  <div class="mf-callout mf-callout--info mf-callout--subtle" role="note">
    <div class="mf-callout__head">
      <span class="mf-callout__icon" aria-hidden="true"></span>
      <div class="mf-callout__title"></div>
    </div>
    <div class="mf-callout__body"></div>
  </div>
</template>

<script id="mf-callout-script">
  (function () {
    if (window.__mfCalloutInit) return;
    window.__mfCalloutInit = true;

    function truthy(v) {
      if (v == null) return false;
      v = String(v).trim().toLowerCase();
      return v === '1' || v === 'true' || v === 'yes' || v === 'on';
    }

    function normalizeVariant(v) {
      v = (v || '').trim().toLowerCase();
      if (v === 'solid' || v === 'outline' || v === 'subtle' || v === 'ghost') return v;
      return 'subtle';
    }

    function normalizeTone(t) {
      t = (t || '').trim().toLowerCase();
      if (t === 'neutral' || t === 'indigo' || t === 'green' || t === 'amber' || t === 'red') return t;
      return '';
    }

    function normalizeKind(k) {
      k = (k || '').trim().toLowerCase();
      if (k === 'info' || k === 'note' || k === 'tip' || k === 'warn' || k === 'danger') return k;
      return 'info';
    }

    function iconSvg(kind) {
      switch (kind) {
        case 'tip':
          return '<svg viewBox="0 0 24 24"><path d="M9 18h6"/><path d="M10 22h4"/><path d="M12 2a7 7 0 0 0-4 12c.6.6 1 1.3 1 2h6c0-.7.4-1.4 1-2A7 7 0 0 0 12 2z"/></svg>';
        case 'warn':
          return '<svg viewBox="0 0 24 24"><path d="M12 9v4"/><path d="M12 17h.01"/><path d="M10.3 3.6 2.2 18a2 2 0 0 0 1.8 3h16a2 2 0 0 0 1.8-3L13.7 3.6a2 2 0 0 0-3.4 0z"/></svg>';
        case 'danger':
          return '<svg viewBox="0 0 24 24"><path d="M12 9v4"/><path d="M12 17h.01"/><path d="M5 5l14 14"/><path d="M19 5 5 19"/></svg>';
        case 'note':
          return '<svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><path d="M14 2v6h6"/><path d="M8 13h8"/><path d="M8 17h6"/></svg>';
        case 'info':
        default:
          return '<svg viewBox="0 0 24 24"><path d="M12 16v-5"/><path d="M12 8h.01"/><path d="M21 12a9 9 0 1 1-18 0 9 9 0 0 1 18 0z"/></svg>';
      }
    }

    function sanitizeHtml(raw) {
      // Minimal sanitizer for docs-controlled content.
      // Allows basic tags: p, a, code, pre, em, strong, ul/ol/li, br.
      // Strips on* attributes.
      if (!raw) return '';

      var container = document.createElement('div');
      container.innerHTML = raw;

      var allowed = {
        P: true, A: true, CODE: true, PRE: true, EM: true, STRONG: true,
        UL: true, OL: true, LI: true, BR: true, SPAN: true
      };

      var walker = document.createTreeWalker(container, NodeFilter.SHOW_ELEMENT, null);
      var toRemove = [];

      while (walker.nextNode()) {
        var node = walker.currentNode;
        if (!allowed[node.tagName]) {
          toRemove.push(node);
          continue;
        }

        // Remove event handlers and javascript: URLs.
        for (var i = node.attributes.length - 1; i >= 0; i--) {
          var a = node.attributes[i];
          var name = a.name.toLowerCase();
          var value = a.value || '';

          if (name.startsWith('on')) {
            node.removeAttribute(a.name);
            continue;
          }

          if (node.tagName === 'A' && name === 'href') {
            var href = value.trim();
            if (href.toLowerCase().startsWith('javascript:')) {
              node.removeAttribute('href');
            }
          }

          // Disallow inline styles.
          if (name === 'style') {
            node.removeAttribute('style');
          }
        }

        if (node.tagName === 'A') {
          node.setAttribute('rel', 'noopener noreferrer');
          // target allowed via input, but default is same-tab.
        }
      }

      for (var j = 0; j < toRemove.length; j++) {
        var n = toRemove[j];
        if (n && n.parentNode) {
          // Keep text content.
          n.replaceWith(document.createTextNode(n.textContent || ''));
        }
      }

      return container.innerHTML;
    }

    function buildCallout(opts) {
      var tpl = document.getElementById('mf-callout-template');
      var root = tpl.content.firstElementChild.cloneNode(true);

      var kind = normalizeKind(opts.kind);
      var variant = normalizeVariant(opts.variant);
      var tone = normalizeTone(opts.tone);

      // Reset classes.
      root.className = 'mf-callout';
      root.classList.add('mf-callout--' + kind);
      root.classList.add('mf-callout--' + variant);
      if (tone) root.classList.add('mf-callout--' + tone);
      if (opts.compact) root.classList.add('mf-callout--compact');

      var title = root.querySelector('.mf-callout__title');
      var body = root.querySelector('.mf-callout__body');
      var icon = root.querySelector('.mf-callout__icon');

      title.textContent = opts.title || (kind.charAt(0).toUpperCase() + kind.slice(1));
      icon.innerHTML = iconSvg(kind);

      if (opts.bodyHtml) {
        body.innerHTML = sanitizeHtml(opts.bodyHtml);
      } else if (opts.bodyText) {
        // Simple paragraphs split.
        var lines = String(opts.bodyText).split(/\n\n+/);
        var html = '';
        for (var i = 0; i < lines.length; i++) {
          var p = lines[i].trim();
          if (!p) continue;
          html += '<p>' + p.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;') + '</p>';
        }
        body.innerHTML = html || '';
      } else {
        body.innerHTML = '';
      }

      // Accessibility.
      root.setAttribute('role', kind === 'danger' ? 'alert' : 'note');
      if (opts.ariaLabel) root.setAttribute('aria-label', opts.ariaLabel);

      return root;
    }

    function upgrade(root) {
      var nodes = (root || document).querySelectorAll('[data-mf-callout]');
      for (var i = 0; i < nodes.length; i++) {
        var host = nodes[i];
        if (host.__mfCalloutUpgraded) continue;
        host.__mfCalloutUpgraded = true;

        var opts = {
          kind: host.getAttribute('data-kind') || 'info',
          title: host.getAttribute('data-title') || '',
          variant: host.getAttribute('data-variant') || 'subtle',
          tone: host.getAttribute('data-tone') || '',
          compact: truthy(host.getAttribute('data-compact')),
          ariaLabel: host.getAttribute('data-aria-label') || '',

          // Body: either raw HTML (trusted docs) or plain text.
          bodyHtml: host.getAttribute('data-body-html') || '',
          bodyText: host.getAttribute('data-body') || ''
        };

        var callout = buildCallout(opts);
        host.replaceWith(callout);
      }
    }

    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', function () { upgrade(document); });
    } else {
      upgrade(document);
    }

    window.MuffinCallout = {
      upgrade: upgrade,
      create: buildCallout
    };
  })();
</script>
