<aside class="site-sidebar">
  <nav class="nav">
    {{ range .Site.Data.nav }}
      <div class="nav-section">
        <div class="nav-title">{{ .title }}</div>
        <div class="nav-items">
          {{ range .items }}
            <a href="{{ .path }}">{{ .title }}</a>
          {{ end }}
        </div>
      </div>
    {{ end }}
  </nav>
</aside>
