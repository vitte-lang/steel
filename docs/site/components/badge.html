
<!--
  Muffin docs component: badge

  Usage (inline):
    <a class="mf-badge" href="...">
      <span class="mf-badge__label">Docs</span>
      <span class="mf-badge__value">Reference</span>
    </a>

  Usage (data-driven):
    <span data-mf-badge
          data-label="Build"
          data-value="muffin configure"
          data-href="/docs/reference/cli/configure/"
          data-variant="solid"
          data-tone="indigo"
          data-icon="bolt"></span>

  Variants:
    - solid | outline | subtle | ghost

  Tones (semantic):
    - neutral | indigo | green | amber | red

  Icons:
    - bolt | tag | lock | box | graph | cpu | shield | file
-->

<style id="mf-badge-style">
  :root {
    --mf-badge-radius: 999px;
    --mf-badge-border: rgba(255,255,255,0.12);
    --mf-badge-bg: rgba(255,255,255,0.06);
    --mf-badge-bg-2: rgba(255,255,255,0.10);
    --mf-badge-fg: rgba(255,255,255,0.92);
    --mf-badge-fg-muted: rgba(255,255,255,0.72);
    --mf-badge-shadow: 0 10px 30px rgba(0,0,0,0.25);

    /* tones */
    --mf-tone-neutral: 200 8% 72%;
    --mf-tone-indigo: 250 90% 70%;
    --mf-tone-green: 150 70% 60%;
    --mf-tone-amber: 40 95% 65%;
    --mf-tone-red: 0 85% 65%;
  }

  .mf-badge {
    --mf-tone: var(--mf-tone-neutral);
    --mf-accent: hsl(var(--mf-tone));
    --mf-accent-soft: hsl(var(--mf-tone) / 0.14);
    --mf-accent-soft-2: hsl(var(--mf-tone) / 0.22);
    --mf-accent-border: hsl(var(--mf-tone) / 0.28);

    display: inline-flex;
    align-items: center;
    gap: 8px;

    padding: 7px 10px;
    border-radius: var(--mf-badge-radius);
    border: 1px solid var(--mf-badge-border);
    background: var(--mf-badge-bg);

    color: var(--mf-badge-fg);
    text-decoration: none;
    user-select: none;
    -webkit-tap-highlight-color: transparent;

    line-height: 1;
    font: 600 12px/1.0 system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
    letter-spacing: 0.2px;

    transition:
      transform 140ms ease,
      background 140ms ease,
      border-color 140ms ease,
      box-shadow 180ms ease,
      opacity 140ms ease;
  }

  .mf-badge:focus-visible {
    outline: 2px solid hsl(var(--mf-tone) / 0.55);
    outline-offset: 2px;
  }

  .mf-badge:hover {
    transform: translateY(-1px);
    border-color: rgba(255,255,255,0.18);
    background: var(--mf-badge-bg-2);
    box-shadow: var(--mf-badge-shadow);
  }

  .mf-badge:active {
    transform: translateY(0);
    box-shadow: none;
    opacity: 0.95;
  }

  .mf-badge__icon {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 16px;
    height: 16px;
  }

  .mf-badge__icon svg {
    width: 16px;
    height: 16px;
    fill: none;
    stroke: currentColor;
    stroke-width: 1.8;
    stroke-linecap: round;
    stroke-linejoin: round;
    opacity: 0.9;
  }

  .mf-badge__label {
    color: var(--mf-badge-fg-muted);
    font-weight: 650;
  }

  .mf-badge__sep {
    width: 1px;
    height: 14px;
    background: rgba(255,255,255,0.14);
    border-radius: 1px;
  }

  .mf-badge__value {
    color: var(--mf-badge-fg);
    font-weight: 700;
  }

  /* Variants */
  .mf-badge--solid {
    background: var(--mf-accent-soft);
    border-color: var(--mf-accent-border);
  }
  .mf-badge--solid:hover {
    background: var(--mf-accent-soft-2);
    border-color: hsl(var(--mf-tone) / 0.36);
  }

  .mf-badge--outline {
    background: transparent;
    border-color: var(--mf-accent-border);
  }
  .mf-badge--outline:hover {
    background: hsl(var(--mf-tone) / 0.10);
    border-color: hsl(var(--mf-tone) / 0.34);
  }

  .mf-badge--subtle {
    background: rgba(255,255,255,0.05);
    border-color: rgba(255,255,255,0.10);
  }

  .mf-badge--ghost {
    background: transparent;
    border-color: transparent;
  }
  .mf-badge--ghost:hover {
    background: rgba(255,255,255,0.06);
    border-color: rgba(255,255,255,0.12);
  }

  /* Tones */
  .mf-badge--neutral { --mf-tone: var(--mf-tone-neutral); }
  .mf-badge--indigo  { --mf-tone: var(--mf-tone-indigo); }
  .mf-badge--green   { --mf-tone: var(--mf-tone-green); }
  .mf-badge--amber   { --mf-tone: var(--mf-tone-amber); }
  .mf-badge--red     { --mf-tone: var(--mf-tone-red); }

  /* Compact */
  .mf-badge--compact {
    padding: 6px 9px;
    gap: 7px;
    font-size: 11.5px;
  }

  /* Accessibility: reduced motion */
  @media (prefers-reduced-motion: reduce) {
    .mf-badge {
      transition: none;
    }
    .mf-badge:hover {
      transform: none;
      box-shadow: none;
    }
  }
</style>

<template id="mf-badge-template">
  <a class="mf-badge mf-badge--subtle mf-badge--neutral" href="#" role="link">
    <span class="mf-badge__icon" aria-hidden="true"></span>
    <span class="mf-badge__label"></span>
    <span class="mf-badge__sep" aria-hidden="true"></span>
    <span class="mf-badge__value"></span>
  </a>
</template>

<script id="mf-badge-script">
  (function () {
    // Prevent double-registration when the component is included multiple times.
    if (window.__mfBadgeInit) return;
    window.__mfBadgeInit = true;

    function el(tag, attrs) {
      var n = document.createElement(tag);
      if (attrs) {
        for (var k in attrs) {
          if (k === 'text') n.textContent = attrs[k];
          else if (k === 'html') n.innerHTML = attrs[k];
          else n.setAttribute(k, attrs[k]);
        }
      }
      return n;
    }

    function iconSvg(name) {
      // Minimal icon set: stroke-based, 16x16.
      switch (name) {
        case 'bolt':
          return '<svg viewBox="0 0 24 24"><path d="M13 2L3 14h7l-1 8 12-14h-7l-1-6z"/></svg>';
        case 'tag':
          return '<svg viewBox="0 0 24 24"><path d="M20.59 13.41 12 22l-9-9V4h9l8.59 9.41z"/><path d="M7 7h.01"/></svg>';
        case 'lock':
          return '<svg viewBox="0 0 24 24"><path d="M7 11V7a5 5 0 0 1 10 0v4"/><path d="M5 11h14v10H5z"/></svg>';
        case 'box':
          return '<svg viewBox="0 0 24 24"><path d="M21 16V8a2 2 0 0 0-1-1.73L13 2.27a2 2 0 0 0-2 0L4 6.27A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/><path d="M3.3 7 12 12l8.7-5"/><path d="M12 22V12"/></svg>';
        case 'graph':
          return '<svg viewBox="0 0 24 24"><path d="M6 20V10"/><path d="M12 20V4"/><path d="M18 20v-6"/></svg>';
        case 'cpu':
          return '<svg viewBox="0 0 24 24"><path d="M9 9h6v6H9z"/><path d="M4 9h2"/><path d="M4 15h2"/><path d="M18 9h2"/><path d="M18 15h2"/><path d="M9 4v2"/><path d="M15 4v2"/><path d="M9 18v2"/><path d="M15 18v2"/><path d="M7 7h10v10H7z"/></svg>';
        case 'shield':
          return '<svg viewBox="0 0 24 24"><path d="M12 2l8 4v6c0 5-3.5 9.5-8 10-4.5-.5-8-5-8-10V6l8-4z"/></svg>';
        case 'file':
          return '<svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><path d="M14 2v6h6"/></svg>';
        default:
          return '';
      }
    }

    function normalizeVariant(v) {
      v = (v || '').trim().toLowerCase();
      if (v === 'solid' || v === 'outline' || v === 'subtle' || v === 'ghost') return v;
      return 'subtle';
    }

    function normalizeTone(t) {
      t = (t || '').trim().toLowerCase();
      if (t === 'neutral' || t === 'indigo' || t === 'green' || t === 'amber' || t === 'red') return t;
      return 'neutral';
    }

    function truthy(v) {
      if (v == null) return false;
      v = String(v).trim().toLowerCase();
      return v === '1' || v === 'true' || v === 'yes' || v === 'on';
    }

    function buildBadge(opts) {
      var tpl = document.getElementById('mf-badge-template');
      var node = tpl.content.firstElementChild.cloneNode(true);

      var variant = normalizeVariant(opts.variant);
      var tone = normalizeTone(opts.tone);

      node.classList.remove('mf-badge--subtle', 'mf-badge--solid', 'mf-badge--outline', 'mf-badge--ghost');
      node.classList.add('mf-badge--' + variant);

      node.classList.remove('mf-badge--neutral', 'mf-badge--indigo', 'mf-badge--green', 'mf-badge--amber', 'mf-badge--red');
      node.classList.add('mf-badge--' + tone);

      if (opts.compact) node.classList.add('mf-badge--compact');

      var icon = node.querySelector('.mf-badge__icon');
      var label = node.querySelector('.mf-badge__label');
      var value = node.querySelector('.mf-badge__value');
      var sep = node.querySelector('.mf-badge__sep');

      label.textContent = opts.label || '';
      value.textContent = opts.value || '';

      // Hide separator if either side is missing.
      if (!opts.label || !opts.value) {
        sep.style.display = 'none';
      }

      var svg = iconSvg(opts.icon || '');
      if (svg) {
        icon.innerHTML = svg;
      } else {
        icon.style.display = 'none';
      }

      var href = opts.href || '';
      if (href) {
        node.setAttribute('href', href);
      } else {
        // Non-link badge.
        node.removeAttribute('href');
        node.setAttribute('role', 'note');
        node.style.cursor = 'default';
      }

      if (opts.title) node.setAttribute('title', opts.title);
      if (opts.ariaLabel) node.setAttribute('aria-label', opts.ariaLabel);

      if (opts.target === '_blank') {
        node.setAttribute('target', '_blank');
        node.setAttribute('rel', 'noopener noreferrer');
      }

      return node;
    }

    function upgrade(root) {
      var nodes = (root || document).querySelectorAll('[data-mf-badge]');
      for (var i = 0; i < nodes.length; i++) {
        var host = nodes[i];
        if (host.__mfBadgeUpgraded) continue;
        host.__mfBadgeUpgraded = true;

        var opts = {
          label: host.getAttribute('data-label') || '',
          value: host.getAttribute('data-value') || '',
          href: host.getAttribute('data-href') || '',
          variant: host.getAttribute('data-variant') || 'subtle',
          tone: host.getAttribute('data-tone') || 'neutral',
          icon: host.getAttribute('data-icon') || '',
          title: host.getAttribute('data-title') || '',
          ariaLabel: host.getAttribute('data-aria-label') || '',
          target: host.getAttribute('data-target') || '',
          compact: truthy(host.getAttribute('data-compact'))
        };

        var badge = buildBadge(opts);
        host.replaceWith(badge);
      }
    }

    // Initial pass.
    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', function () { upgrade(document); });
    } else {
      upgrade(document);
    }

    // Expose a tiny API for dynamic content.
    window.MuffinBadge = {
      upgrade: upgrade,
      create: buildBadge
    };
  })();
</script>
